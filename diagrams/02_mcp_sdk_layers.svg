<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>El rol del SDK en MCP</title>
  <desc>El SDK es la capa intermedia que maneja el protocolo MCP (handshake, formato de mensajes, transporte) entre el cliente y el server. Vos solo escribís tu lógica arriba; el SDK traduce a protocolo abajo.</desc>

  <style>
    .lbl   { fill: var(--text-primary, #1a1a1a); }
    .sub   { fill: var(--text-secondary, #6b6b6b); font-size: 12px; }
    .ttl   { font-size: 14px; font-weight: 700; }
    .yours { fill: var(--bg-secondary, #eef1f0); stroke: var(--text-secondary, #6b6b6b); stroke-width: 2; }
    .sdk   { fill: var(--bg-secondary, #f0ece3); stroke: var(--accent, #cc785c); stroke-width: 2; }
    .wire  { fill: var(--bg-secondary, #f4f3ee); stroke: var(--border, #d8d5cc); stroke-width: 1.5; }
    .flow  { stroke: var(--text-secondary, #6b6b6b); stroke-width: 1.6; fill: none; }
    .note  { fill: var(--text-secondary, #8a8a8a); font-size: 11px; font-style: italic; }
    .tag   { fill: var(--accent, #cc785c); font-size: 11px; font-weight: 700; }
  </style>

  <text x="170" y="34" text-anchor="middle" class="lbl ttl">CLIENTE (Claude / test_client.py)</text>

  <rect x="40" y="50" width="260" height="70" rx="10" class="yours"/>
  <text x="170" y="78" text-anchor="middle" class="lbl ttl">Tu lógica</text>
  <text x="170" y="98" text-anchor="middle" class="sub">"pedí get_pnl y mostrá"</text>
  <text x="56" y="138" class="tag">lo que escribís vos</text>

  <rect x="40" y="150" width="260" height="86" rx="10" class="sdk"/>
  <text x="170" y="178" text-anchor="middle" class="lbl ttl">SDK de MCP</text>
  <text x="170" y="198" text-anchor="middle" class="sub">ClientSession, stdio_client</text>
  <text x="170" y="216" text-anchor="middle" class="sub">arma handshake y llamadas</text>

  <text x="630" y="34" text-anchor="middle" class="lbl ttl">SERVER (finance-mcp)</text>

  <rect x="500" y="50" width="260" height="70" rx="10" class="yours"/>
  <text x="630" y="78" text-anchor="middle" class="lbl ttl">Tu lógica</text>
  <text x="630" y="98" text-anchor="middle" class="sub">def get_pnl(...): consolida</text>
  <text x="516" y="138" class="tag">lo que escribís vos</text>

  <rect x="500" y="150" width="260" height="86" rx="10" class="sdk"/>
  <text x="630" y="178" text-anchor="middle" class="lbl ttl">SDK de MCP</text>
  <text x="630" y="198" text-anchor="middle" class="sub">FastMCP, @mcp.tool()</text>
  <text x="630" y="216" text-anchor="middle" class="sub">envuelve tu función en protocolo</text>

  <path class="flow" d="M170 120 L170 148" marker-end="url(#a)"/>
  <path class="flow" d="M170 148 L170 122" marker-end="url(#a)"/>
  <path class="flow" d="M630 120 L630 148" marker-end="url(#a)"/>
  <path class="flow" d="M630 148 L630 122" marker-end="url(#a)"/>

  <rect x="40" y="300" width="720" height="86" rx="10" class="wire"/>
  <text x="400" y="328" text-anchor="middle" class="lbl ttl">El protocolo MCP por el caño (stdio / JSON-RPC)</text>
  <text x="400" y="350" text-anchor="middle" class="sub">initialize  ·  list_tools  ·  call_tool  ·  resultados</text>
  <text x="400" y="370" text-anchor="middle" class="note">esto lo maneja el SDK entero, vos no escribís nada de esto</text>

  <path class="flow" d="M170 236 L170 298" marker-end="url(#a)"/>
  <text x="184" y="270" class="tag">3</text>
  <path class="flow" d="M630 298 L630 238" marker-end="url(#a)"/>
  <text x="600" y="270" class="tag">4</text>

  <text x="56" y="262" class="note">tu pedido baja...</text>
  <text x="520" y="262" class="note">...y sube como llamada</text>

  <text x="184" y="142" class="tag">1</text>
  <text x="600" y="142" class="tag">2</text>

  <rect x="40" y="418" width="720" height="58" rx="10" class="wire"/>
  <text x="60" y="443" class="lbl ttl">Idea clave</text>
  <text x="60" y="463" class="sub">El SDK es el traductor. Vos hablás "Python normal" arriba; el SDK lo convierte al idioma del protocolo abajo, en las dos puntas.</text>

  <rect x="40" y="498" width="16" height="16" rx="3" class="yours"/>
  <text x="64" y="510" class="sub">Lo que escribís vos (lógica)</text>
  <rect x="320" y="498" width="16" height="16" rx="3" class="sdk"/>
  <text x="344" y="510" class="sub">El SDK (plomería del protocolo)</text>
  <rect x="600" y="498" width="16" height="16" rx="3" class="wire"/>
  <text x="624" y="510" class="sub">El caño (mensajes)</text>

  <text x="40" y="546" class="note">Flujo: 1 tu pedido → 2 el server tiene la función → 3 el SDK baja el pedido al protocolo → 4 el SDK del server lo recibe, ejecuta tu función y devuelve.</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="var(--text-secondary, #6b6b6b)"/>
    </marker>
  </defs>
</svg>
